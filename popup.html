<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=500, initial-scale=1.0" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        width: 600px; /* 3단 뷰를 위해 너비를 살짝 넓혔습니다 */
        padding: 15px;
      }
      .animate-fade-in {
        animation: fadeIn 0.2s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      #resultArea blockquote {
        border-left: 4px solid #10b981;
        padding-left: 1rem;
        margin-top: 1rem;
        color: #6ee7b7;
      }
      #resultArea a {
        color: #60a5fa;
        text-decoration: underline;
      }
      #resultArea strong {
        color: #fff;
        font-weight: bold;
      }
      .marked__paragraph {
        margin-bottom: 0.25rem;
        min-height: 1.2em;
      }
      .marked__paragraph--empty {
        margin-bottom: 0.5rem;
      }
    </style>
  </head>
  <body class="bg-gray-100">
    <div
      class="max-w-4xl mx-auto bg-white shadow-2xl rounded-2xl overflow-hidden border border-gray-200"
    >
      <div class="bg-gray-800 p-4 text-white flex justify-between items-center">
        <h1 class="text-lg font-bold tracking-tighter text-gray-300 underline">
          아지트 글 템플릿
        </h1>
        <span>made by jm.zshfz</span>
      </div>

      <div class="bg-yellow-50 p-3 border-b border-yellow-200 flex gap-2">
        <span
          class="text-xs font-bold text-yellow-800 self-center whitespace-nowrap"
          >자산 복사기:</span
        >
        <button
          id="scrapeBothBtn"
          class="flex-1 bg-white border border-yellow-300 text-yellow-800 text-xs py-1.5 rounded shadow-sm hover:bg-yellow-100 font-bold transition"
        >
          품명/자산코드 복사
        </button>
        <button
          id="scrapeCodeBtn"
          class="flex-1 bg-white border border-yellow-300 text-yellow-800 text-xs py-1.5 rounded shadow-sm hover:bg-yellow-100 font-bold transition"
        >
          자산코드만 복사
        </button>
      </div>

      <div class="p-6 space-y-4">
        <div>
          <label class="block text-xs font-bold text-gray-700 mb-1 font-mono"
            >@TARGET_ID</label
          >
          <input
            type="text"
            id="targetId"
            placeholder="아이디 입력"
            class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl outline-none"
          />
        </div>

        <div>
          <div class="flex justify-between items-end mb-1">
            <label class="text-xs font-bold text-gray-700 font-mono italic"
              >CC SELECTION</label
            >
            <button
              id="uncheckBtn"
              class="text-[10px] text-red-500 border border-red-200 px-1 py-0.5 rounded bg-red-50 text-xs"
            >
              전체 해제
            </button>
          </div>
          <div
            class="flex flex-wrap gap-2 bg-gray-50 p-3 rounded-xl border border-gray-200"
          >
            <label class="inline-flex items-center gap-1.5"
              ><input
                type="checkbox"
                name="cc"
                value="@dino.mater"
                checked
                class="w-4 h-4"
              /><span class="text-xs font-medium text-gray-600"
                >@dino.mater</span
              ></label
            >
            <label class="inline-flex items-center gap-1.5"
              ><input
                type="checkbox"
                name="cc"
                value="@click.me"
                checked
                class="w-4 h-4"
              /><span class="text-xs font-medium text-gray-600"
                >@click.me</span
              ></label
            >
            <label class="inline-flex items-center gap-1.5"
              ><input
                type="checkbox"
                name="cc"
                value="@jay.jjj"
                checked
                class="w-4 h-4"
              /><span class="text-xs font-medium text-gray-600"
                >@jay.jjj</span
              ></label
            >
            <label class="inline-flex items-center gap-1.5"
              ><input
                type="checkbox"
                name="cc"
                value="@roy.00"
                checked
                class="w-4 h-4"
              /><span class="text-xs font-medium text-gray-600"
                >@roy.00</span
              ></label
            >
            <label class="inline-flex items-center gap-1.5"
              ><input
                type="checkbox"
                name="cc"
                value="@cloi.c"
                class="w-4 h-4"
              /><span class="text-xs font-medium text-gray-600"
                >@cloi.c</span
              ></label
            >
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-700 mb-1 font-mono"
            >MESSAGE</label
          >
          <textarea
            id="middleMsg"
            rows="2"
            class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl outline-none"
          ></textarea>
        </div>

        <div class="grid grid-cols-2 gap-2 text-xs">
          <label
            class="bg-indigo-50 p-3 rounded-xl border border-indigo-200 flex items-center gap-2 cursor-pointer"
            ><input
              type="checkbox"
              id="useLaptopGivePlan"
              class="w-4 h-4"
            /><span class="text-indigo-900 font-bold whitespace-nowrap"
              >💻 노트북 교체자 지급예정</span
            ></label
          >
          <label
            class="bg-indigo-50 p-3 rounded-xl border border-indigo-200 flex items-center gap-2 cursor-pointer"
            ><input
              type="checkbox"
              id="useLaptopGiveDone"
              class="w-4 h-4"
            /><span class="text-indigo-900 font-bold whitespace-nowrap"
              >💻 노트북 교체자 지급완료</span
            ></label
          >
          <label
            class="bg-green-50 p-3 rounded-xl border border-green-200 flex items-center gap-2 cursor-pointer"
            ><input type="checkbox" id="useSurvey" class="w-4 h-4" /><span
              class="text-green-900 font-bold whitespace-nowrap"
              >📝 노트북 교체자 사내매각 설문</span
            ></label
          >
          <label
            class="bg-blue-50 p-3 rounded-xl border border-blue-200 flex items-center gap-2 cursor-pointer"
            ><input type="checkbox" id="useOffice" class="w-4 h-4" /><span
              class="text-blue-900 font-bold"
              >🏢 오피스</span
            ></label
          >
          <label
            class="bg-yellow-50 p-3 rounded-xl border border-yellow-200 flex items-center gap-2 cursor-pointer"
            ><input type="checkbox" id="useHangul" class="w-4 h-4" /><span
              class="text-yellow-900 font-bold"
              >📄 한글</span
            ></label
          >
          <label
            class="bg-purple-50 p-3 rounded-xl border border-purple-200 flex items-center gap-2 cursor-pointer"
            ><input type="checkbox" id="useSW" class="w-4 h-4" /><span
              class="text-purple-900 font-bold"
              >💿 SW 회수</span
            ></label
          >
          <label
            class="bg-gray-200 p-3 rounded-xl border border-gray-300 flex items-center gap-2 cursor-pointer"
            ><input type="checkbox" id="useLeave" class="w-4 h-4" /><span
              class="text-gray-900 font-bold"
              >🏖️ 휴직</span
            ></label
          >
          <label
            class="bg-gray-200 p-3 rounded-xl border border-gray-300 flex items-center gap-2 cursor-pointer"
            ><input type="checkbox" id="useRetireO" class="w-4 h-4" /><span
              class="text-gray-900 font-bold"
              >🏃 퇴사(이관O)</span
            ></label
          >
          <label
            class="bg-gray-200 p-3 rounded-xl border border-gray-300 flex items-center gap-2 cursor-pointer"
            ><input type="checkbox" id="useRetireX" class="w-4 h-4" /><span
              class="text-gray-900 font-bold"
              >🏃 퇴사(이관X)</span
            ></label
          >
        </div>

        <div id="dynamicInputs" class="space-y-2">
          <div id="retireOInput" class="hidden animate-fade-in">
            <input
              type="text"
              id="receiverId"
              placeholder="GWS 이관 받을 사람 ID (예: euler.calc)"
              class="w-full p-3 border-2 border-orange-200 rounded-xl outline-none text-xs"
            />
          </div>
          <div id="swInput" class="hidden animate-fade-in">
            <textarea
              id="swInfo"
              rows="2"
              placeholder="회수 소프트웨어 정보"
              class="w-full p-3 border-2 border-purple-200 rounded-xl outline-none text-xs"
            ></textarea>
          </div>
        </div>

        <hr />

        <div class="grid grid-cols-3 gap-2">
          <div
            class="bg-green-50 p-2 rounded-xl border border-green-100 flex flex-col"
          >
            <select
              id="giveStatus"
              class="w-full text-xs font-bold bg-white border rounded mb-2 outline-none p-1"
            >
              <option value="지급완료">지급완료</option>
              <option value="지급예정">지급예정</option>
            </select>
            <textarea
              id="giveInfo"
              rows="3"
              placeholder="지급 장비 입력"
              class="w-full p-2 text-xs border rounded outline-none flex-1 resize-none"
            ></textarea>
          </div>
          <div
            class="bg-red-50 p-2 rounded-xl border border-red-100 flex flex-col"
          >
            <select
              id="returnStatus"
              class="w-full text-xs font-bold bg-white border rounded mb-2 outline-none p-1"
            >
              <option value="반납완료">반납완료</option>
              <option value="반납완료 & 매각대기">반납완료 & 매각대기</option>
              <option value="반납완료 & 폐기">반납완료 & 폐기</option>
              <option value="반납예정">반납예정</option>
            </select>
            <textarea
              id="returnInfo"
              rows="3"
              placeholder="반납 장비 입력"
              class="w-full p-2 text-xs border rounded outline-none flex-1 resize-none"
            ></textarea>
          </div>
          <div
            class="bg-purple-50 p-2 rounded-xl border border-purple-100 flex flex-col"
          >
            <select
              id="rentStatus"
              class="w-full text-xs font-bold bg-white border rounded mb-2 outline-none p-1"
            >
              <option value="대여완료">대여완료</option>
              <option value="대여예정">대여예정</option>
            </select>
            <textarea
              id="rentInfo"
              rows="3"
              placeholder="대여 장비 입력"
              class="w-full p-2 text-xs border rounded outline-none flex-1 resize-none"
            ></textarea>
          </div>
        </div>

        <div class="mt-4 grid grid-cols-4 gap-2">
          <button
            id="copyBtn"
            class="col-span-3 bg-gray-800 text-white py-3 rounded-xl hover:bg-black font-bold text-sm transition-colors duration-200"
          >
            📋 템플릿 전체 복사하기
          </button>
          <button
            id="resetBtn"
            class="col-span-1 bg-white border-2 border-gray-200 text-gray-500 py-3 rounded-xl hover:bg-gray-100 font-bold text-sm transition-colors duration-200"
          >
            🔄 초기화
          </button>
        </div>

        <div
          id="resultArea"
          class="w-full p-4 bg-gray-900 text-green-400 font-mono text-xs rounded-xl overflow-y-auto h-32 break-words mt-2"
        ></div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
